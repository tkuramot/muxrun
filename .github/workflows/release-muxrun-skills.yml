name: release-muxrun-skills

on:
  push:
    branches:
      - main
    paths:
      - "plugin/.claude-plugin/plugin.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(jq -r .version plugin/.claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=muxrun-skills-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create archive
        if: steps.check.outputs.exists == 'false'
        run: |
          tar -czf "muxrun-skills-${{ steps.version.outputs.version }}.tar.gz" -C plugin .

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "muxrun-skills v${{ steps.version.outputs.version }}" \
            --generate-notes \
            "muxrun-skills-${{ steps.version.outputs.version }}.tar.gz"
